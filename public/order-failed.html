<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Failed — BookStore</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .result-box { max-width: 480px; margin: 5rem auto; text-align: center; background: #fff; border: 1px solid #eaeaea; border-radius: 4px; padding: 3rem 2rem; }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
    h1 { color: #d81006; margin-bottom: 0.5rem; font-weight: 500; }
    p { color: #666; margin-bottom: 1.5rem; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="nav-brand">BookStore</a>
  <div class="nav-links"><a href="/">Home</a></div>
</nav>
<div class="container">
  <div class="result-box">
    <div class="icon">❌</div>
    <h1>Payment Failed</h1>
    <p>Your payment could not be processed. Your cart has not been charged. Please try again.</p>
    <div style="display:flex;gap:1rem;justify-content:center">
      <a href="/cart" class="btn btn-primary">Try Again</a>
      <a href="/" class="btn btn-outline">Go Home</a>
    </div>
  </div>
</div>
</body>
</html>
